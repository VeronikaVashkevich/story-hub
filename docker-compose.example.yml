version: '3.8'

services:
  php:
    build:
      dockerfile: .docker/php/Dockerfile
    volumes:
      - '.:/var/www/html'

  nginx:
    image:
      nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - '.:/var/www/html'
      - './.docker/nginx/conf.d:/etc/nginx/conf.d'

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - ./.docker/volume/mysql:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "9090:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
